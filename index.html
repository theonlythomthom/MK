<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🏆 Mario Kart World Cup</title>
    <meta name="color-scheme" content="light" />
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f7ff;
        --card: #ffffff;
        --text: #1b1d2a;
        --muted: #687087;
        --accent: #4f46e5;
        --border: rgba(79, 70, 229, 0.12);
        --shadow: 0 20px 60px rgba(18, 26, 70, 0.14);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: radial-gradient(circle at top, #eef2ff 0%, var(--bg) 42%, #eef1f8 100%);
        color: var(--text);
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .card {
        width: min(720px, 100%);
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 24px;
        box-shadow: var(--shadow);
        padding: 28px;
      }
      .eyebrow {
        margin: 0 0 10px;
        font-size: 12px;
        font-weight: 800;
        letter-spacing: .14em;
        text-transform: uppercase;
        color: var(--accent);
      }
      h1 {
        margin: 0 0 10px;
        font-size: clamp(28px, 4vw, 42px);
        line-height: 1.05;
      }
      p { margin: 0 0 12px; line-height: 1.55; color: var(--muted); }
      .row { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 18px; }
      .btn {
        appearance: none;
        border: 0;
        border-radius: 999px;
        padding: 12px 18px;
        font-weight: 700;
        cursor: pointer;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
      .btn-primary { background: var(--accent); color: #fff; }
      .btn-secondary { background: #eef2ff; color: #2d3474; }
      .note {
        margin-top: 18px;
        padding: 14px 16px;
        border-radius: 16px;
        background: #f8faff;
        border: 1px solid rgba(99, 102, 241, 0.08);
        font-size: 14px;
        color: #42506f;
      }
      code { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    </style>
  </head>
  <body>
    <div class="card">
      <p class="eyebrow">Mario Kart World Cup</p>
      <h1 id="title">App wird gestartet…</h1>
      <p id="status">Bitte einen Moment.</p>
      <div class="row" id="actions" hidden>
        <a class="btn btn-primary" href="./dist/index.html">Produktions-App öffnen</a>
        <a class="btn btn-secondary" href="./START_APP.bat">Windows-Startskript</a>
      </div>
      <div class="note" id="note">
        Wenn du die ZIP direkt öffnest, wird automatisch die gebaute App in <code>dist/index.html</code> verwendet.
        Für Entwicklung lädt Vite weiterhin <code>src/main.jsx</code>.
      </div>
    </div>
    <script>
      (function () {
        const title = document.getElementById('title');
        const status = document.getElementById('status');
        const actions = document.getElementById('actions');
        const isDevServer = location.protocol !== 'file:' && String(location.port) === '5173';
        if (isDevServer) {
          title.textContent = 'Vite-Entwicklungsmodus';
          status.textContent = 'Die Quell-App wird jetzt geladen.';
          const script = document.createElement('script');
          script.type = 'module';
          script.src = '/src/main.jsx';
          script.onerror = function () {
            title.textContent = 'Startfehler';
            status.textContent = 'Die Dev-App konnte nicht geladen werden.';
            actions.hidden = false;
          };
          document.body.appendChild(script);
          return;
        }
        title.textContent = 'Produktions-App wird geöffnet';
        status.textContent = 'Du wirst automatisch zu dist/index.html weitergeleitet.';
        const target = './dist/index.html';
        try {
          location.replace(target);
        } catch (err) {
          actions.hidden = false;
          title.textContent = 'Bitte Produktiv-App manuell öffnen';
          status.textContent = 'Die automatische Weiterleitung wurde blockiert. Öffne dist/index.html oder nutze START_APP.bat.';
        }
      })();
    </script>
  </body>
</html>
